<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 2026 일정 관리</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- SheetJS for Excel read/write -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f1f5f9;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .task-item {
            transition: all 0.2s ease-in-out;
            animation: slideIn 0.3s ease-out forwards;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-checkbox:checked + div {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }
        .custom-checkbox:checked + div svg {
            display: block;
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(1);
            opacity: 0.8;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        .calendar-cell {
            min-height: 90px;
            transition: background-color 0.2s;
        }
        
        .calendar-cell:hover {
            background-color: #f8fafc;
        }
        
        .calendar-task-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            flex-shrink: 0;
        }
        
        .calendar-task-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.75rem;
            line-height: 1.2;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-2 sm:p-6 text-slate-800">

    <div class="w-full max-w-[1500px] bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col lg:flex-row border border-slate-200" style="height: 92vh; max-height: 950px;">
        
        <!-- Left Section: Calendar View (70%) -->
        <div class="w-full lg:w-[70%] bg-white flex flex-col border-b lg:border-b-0 lg:border-r border-slate-200 h-[50vh] lg:h-full shrink-0">
            <!-- Calendar Header -->
            <div class="bg-slate-800 p-4 sm:p-6 flex justify-between items-center text-white shrink-0">
                <div class="flex items-center gap-3 sm:gap-4">
                    <h2 class="text-xl sm:text-2xl font-bold" id="calendar-title">2026년 7월</h2>
                    <div class="flex gap-1.5 sm:gap-2">
                        <button id="cal-btn-prev" class="p-2 hover:bg-slate-700 rounded-lg transition">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <button id="cal-btn-today" class="px-3 py-1 text-sm font-medium border border-slate-600 rounded-lg hover:bg-slate-700 transition">
                            오늘
                        </button>
                        <button id="cal-btn-next" class="p-2 hover:bg-slate-700 rounded-lg transition">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="text-xs sm:text-sm text-slate-300 font-medium hidden sm:block">
                    <i class="far fa-calendar-alt mr-1"></i> 날짜를 클릭하여 일정을 관리하세요
                </div>
            </div>

            <!-- Calendar Grid Layout -->
            <div class="flex-1 overflow-auto bg-slate-50 p-2 sm:p-4">
                <div class="grid grid-cols-7 border-t border-l border-slate-200 bg-white rounded-lg overflow-hidden shadow-sm h-full">
                    <div class="bg-slate-100 p-2 text-center text-xs sm:text-sm font-bold text-red-500 border-r border-b border-slate-200">일</div>
                    <div class="bg-slate-100 p-2 text-center text-xs sm:text-sm font-bold text-slate-700 border-r border-b border-slate-200">월</div>
                    <div class="bg-slate-100 p-2 text-center text-xs sm:text-sm font-bold text-slate-700 border-r border-b border-slate-200">화</div>
                    <div class="bg-slate-100 p-2 text-center text-xs sm:text-sm font-bold text-slate-700 border-r border-b border-slate-200">수</div>
                    <div class="bg-slate-100 p-2 text-center text-xs sm:text-sm font-bold text-slate-700 border-r border-b border-slate-200">목</div>
                    <div class="bg-slate-100 p-2 text-center text-xs sm:text-sm font-bold text-slate-700 border-r border-b border-slate-200">금</div>
                    <div class="bg-slate-100 p-2 text-center text-xs sm:text-sm font-bold text-blue-500 border-r border-b border-slate-200">토</div>
                    <div id="calendar-grid-body" class="contents"></div>
                </div>
            </div>
        </div>

        <!-- Right Section: Task Management (30%) -->
        <div class="w-full lg:w-[30%] flex flex-col h-[50vh] lg:h-full bg-white">
            
            <!-- Header Section -->
            <div class="bg-indigo-600 p-4 sm:p-5 text-white shrink-0">
                <div class="flex justify-between items-center mb-3">
                    <h1 class="text-xl font-bold flex items-center gap-2">
                        <i class="fas fa-check-double"></i> 선택한 일정
                    </h1>
                    <div class="flex gap-2">
                        <!-- Excel Import Button -->
                        <label title="엑셀 일정 불러오기" class="bg-indigo-700 hover:bg-indigo-800 text-white text-xs px-3 py-1.5 rounded-lg font-medium transition flex items-center gap-1.5 shadow-sm cursor-pointer">
                            <i class="fas fa-file-import text-yellow-300"></i> 엑셀 불러오기
                            <input type="file" id="excel-file-input" accept=".xlsx, .xls" class="hidden">
                        </label>
                        <!-- Excel Export Button -->
                        <button id="btn-export" title="엑셀로 내보내기" class="bg-indigo-700 hover:bg-indigo-800 text-white text-xs px-3 py-1.5 rounded-lg font-medium transition flex items-center gap-1.5 shadow-sm">
                            <i class="fas fa-file-excel text-emerald-300"></i> 저장
                        </button>
                    </div>
                </div>
                
                <!-- Date Navigator -->
                <div class="flex items-center justify-between bg-indigo-700/50 rounded-xl p-2 backdrop-blur-sm border border-indigo-500/50">
                    <button id="btn-prev" class="p-1.5 px-2.5 hover:bg-white/20 rounded-lg transition">
                        <i class="fas fa-chevron-left text-sm"></i>
                    </button>
                    <div class="relative font-medium text-base flex items-center justify-center">
                        <input type="date" id="date-picker" class="bg-transparent text-center cursor-pointer outline-none appearance-none w-full text-white">
                    </div>
                    <button id="btn-next" class="p-1.5 px-2.5 hover:bg-white/20 rounded-lg transition">
                        <i class="fas fa-chevron-right text-sm"></i>
                    </button>
                </div>
                
                <!-- Progress Bar -->
                <div class="mt-3">
                    <div class="flex justify-between text-xs sm:text-sm mb-1.5 text-indigo-100 font-medium">
                        <span id="date-display-text">달성률</span>
                        <span id="progress-text">0%</span>
                    </div>
                    <div class="w-full bg-indigo-900/40 rounded-full h-2 shadow-inner">
                        <div id="progress-bar" class="bg-gradient-to-r from-blue-300 to-white h-2 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Task List Area -->
            <div class="flex-1 overflow-y-auto p-4 bg-slate-50" id="task-container">
                <div id="empty-state" class="hidden flex flex-col items-center justify-center h-full text-slate-400">
                    <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-3">
                        <i class="fas fa-coffee text-2xl text-slate-300"></i>
                    </div>
                    <p class="font-medium text-slate-500 text-sm">등록된 일정이 없습니다</p>
                    <p class="text-xs mt-1 text-slate-400">엑셀을 불러오거나 새로운 할 일을 추가해보세요!</p>
                </div>
                
                <ul id="task-list" class="space-y-2.5 pb-4"></ul>
            </div>

            <!-- Input Section -->
            <div class="p-4 bg-white border-t border-slate-100 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.02)]">
                <form id="add-form" class="flex gap-2">
                    <input type="text" id="task-input" autocomplete="off" placeholder="무엇을 해야 하나요?" 
                        class="flex-1 min-w-[90px] px-3 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100 transition text-slate-700 text-sm">
                    <input type="time" id="task-time" title="시간 설정(선택)" class="w-36 px-2 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100 transition text-slate-700 font-medium text-center shrink-0 text-sm">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 active:transform active:scale-95 text-white px-4 py-3 rounded-xl font-medium transition shadow-md shadow-indigo-200/50 flex items-center justify-center shrink-0">
                        <i class="fas fa-plus text-base"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let tasksData = JSON.parse(localStorage.getItem('my_todo_data')) || {};
        let currentDate = getTodayString();
        let calendarCurrentDate = new Date(currentDate);

        const datePicker = document.getElementById('date-picker');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnExport = document.getElementById('btn-export');
        const excelFileInput = document.getElementById('excel-file-input');
        const taskList = document.getElementById('task-list');
        const emptyState = document.getElementById('empty-state');
        const addForm = document.getElementById('add-form');
        const taskInput = document.getElementById('task-input');
        const taskTime = document.getElementById('task-time');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const dateDisplayText = document.getElementById('date-display-text');
        
        const calendarTitle = document.getElementById('calendar-title');
        const calendarGridBody = document.getElementById('calendar-grid-body');
        const calBtnPrev = document.getElementById('cal-btn-prev');
        const calBtnNext = document.getElementById('cal-btn-next');
        const calBtnToday = document.getElementById('cal-btn-today');

        function init() {
            datePicker.value = currentDate;
            setupEventListeners();
            render();
        }

        function getTodayString() {
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
        }

        function saveData() {
            localStorage.setItem('my_todo_data', JSON.stringify(tasksData));
        }

        function formatDateToYYYYMMDD(date) {
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function changeDate(days) {
            const dateObj = new Date(currentDate);
            dateObj.setDate(dateObj.getDate() + days);
            currentDate = dateObj.toISOString().split('T')[0];
            datePicker.value = currentDate;
            calendarCurrentDate = new Date(currentDate);
            render();
        }

        function generateCalendar() {
            calendarGridBody.innerHTML = '';
            const year = calendarCurrentDate.getFullYear();
            const month = calendarCurrentDate.getMonth();
            calendarTitle.textContent = `${year}년 ${month + 1}월`;

            const firstDayOfMonth = new Date(year, month, 1);
            const lastDayOfMonth = new Date(year, month + 1, 0);
            const daysInMonth = lastDayOfMonth.getDate();
            const firstDayOfWeek = firstDayOfMonth.getDay();

            let currentDay = 1;
            let totalCells = Math.ceil((daysInMonth + firstDayOfWeek) / 7) * 7;

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'calendar-cell border-r border-b border-slate-200 p-1.5 sm:p-2.5 relative flex flex-col gap-1 cursor-pointer';
                
                if (i < firstDayOfWeek || currentDay > daysInMonth) {
                    cell.classList.add('bg-slate-50/70', 'text-slate-300');
                } else {
                    const cellDate = new Date(year, month, currentDay);
                    const cellDateString = formatDateToYYYYMMDD(cellDate);
                    
                    let dateColorClass = 'text-slate-700';
                    if (i % 7 === 0) dateColorClass = 'text-red-500';
                    if (i % 7 === 6) dateColorClass = 'text-blue-500';
                    
                    const todayStr = getTodayString();
                    let dateHtml = `<span class="text-xs sm:text-sm font-medium ${dateColorClass} mb-1 block">${currentDay}</span>`;
                    
                    if (cellDateString === todayStr) {
                         dateHtml = `<span class="text-xs sm:text-sm font-bold bg-indigo-600 text-white rounded-full w-6 h-6 flex items-center justify-center mb-1">${currentDay}</span>`;
                    }
                    
                    if (cellDateString === currentDate) {
                        cell.classList.add('bg-indigo-50/80', 'ring-2', 'ring-indigo-400', 'z-10');
                    }

                    let tasksHtml = '<div class="flex flex-col gap-1 overflow-hidden flex-1">';
                    if (tasksData[cellDateString]) {
                        const tasks = tasksData[cellDateString];
                        const displayTasks = tasks.slice(0, 3);
                        
                        displayTasks.forEach(task => {
                            const dotColor = task.completed ? 'bg-slate-400' : 'bg-indigo-500';
                            const textColor = task.completed ? 'text-slate-400 line-through' : 'text-slate-700';
                            const timeStr = task.time ? `<span class="text-[0.6rem] text-slate-400 ml-1 font-mono">[${task.time}]</span>` : '';

                            tasksHtml += `
                                <div class="flex items-center w-full px-1 py-0.5 rounded hover:bg-slate-200/50 transition-colors">
                                    <span class="calendar-task-dot ${dotColor}"></span>
                                    <span class="calendar-task-text ${textColor}" title="${task.text}">${task.text}${timeStr}</span>
                                </div>
                            `;
                        });
                        
                        if (tasks.length > 3) {
                            tasksHtml += `<div class="text-[0.65rem] text-indigo-600 font-semibold px-1">+${tasks.length - 3}개 더보기</div>`;
                        }
                    }
                    tasksHtml += '</div>';

                    cell.innerHTML = dateHtml + tasksHtml;
                    cell.addEventListener('click', () => {
                        currentDate = cellDateString;
                        datePicker.value = currentDate;
                        render();
                    });
                    currentDay++;
                }
                calendarGridBody.appendChild(cell);
            }
        }

        function setupEventListeners() {
            datePicker.addEventListener('change', (e) => {
                currentDate = e.target.value;
                calendarCurrentDate = new Date(currentDate);
                render();
            });

            btnPrev.addEventListener('click', () => changeDate(-1));
            btnNext.addEventListener('click', () => changeDate(1));

            addForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = taskInput.value.trim();
                const time = taskTime.value;
                if (!text) return;

                if (!tasksData[currentDate]) {
                    tasksData[currentDate] = [];
                }

                tasksData[currentDate].push({
                    id: Date.now().toString() + Math.random(),
                    text: text,
                    time: time,
                    completed: false
                });

                taskInput.value = '';
                taskTime.value = '';
                saveData();
                render();
            });

            calBtnPrev.addEventListener('click', () => {
                calendarCurrentDate.setMonth(calendarCurrentDate.getMonth() - 1);
                generateCalendar();
            });

            calBtnNext.addEventListener('click', () => {
                calendarCurrentDate.setMonth(calendarCurrentDate.getMonth() + 1);
                generateCalendar();
            });

            calBtnToday.addEventListener('click', () => {
                calendarCurrentDate = new Date();
                currentDate = getTodayString();
                datePicker.value = currentDate;
                render();
            });

            btnExport.addEventListener('click', () => {
                exportToExcel();
            });

            excelFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(evt) {
                    try {
                        const data = new Uint8Array(evt.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});

                        let importedCount = 0;
                        
                        // 엑셀 행을 순회하며 날짜와 내용 파싱 (유연하게 컬럼 탐색)
                        json.forEach((row, idx) => {
                            if (idx === 0) return; // 헤더 스킵 가정
                            let dateStr = '';
                            let contentStr = '';
                            let timeStr = '';

                            row.forEach(cell => {
                                if (!cell) return;
                                const cellStr = String(cell).trim();
                                // YYYY-MM-DD 또는 YYYY.MM.DD 형태 감지
                                if (/^202[6-9][-\.]\d{1,2}[-\.]\d{1,2}/.test(cellStr)) {
                                    dateStr = cellStr.replace(/\./g, '-');
                                } else if (!contentStr && cellStr.length > 1) {
                                    contentStr = cellStr;
                                }
                            });

                            if (dateStr && contentStr) {
                                if (!tasksData[dateStr]) {
                                    tasksData[dateStr] = [];
                                }
                                // 중복 등록 방지 체크
                                const exists = tasksData[dateStr].some(t => t.text === contentStr);
                                if (!exists) {
                                    tasksData[dateStr].push({
                                        id: Date.now().toString() + Math.random(),
                                        text: contentStr,
                                        time: timeStr,
                                        completed: false
                                    });
                                    importedCount++;
                                }
                            }
                        });

                        saveData();
                        render();
                        alertCustom(`엑셀에서 ${importedCount}개의 일정을 성공적으로 불러왔습니다!`);
                    } catch (err) {
                        console.error(err);
                        alertCustom('엑셀 파일을 읽는 중 오류가 발생했습니다.');
                    }
                    excelFileInput.value = '';
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function exportToExcel() {
            let allTasksList = [];
            Object.keys(tasksData).forEach(dateStr => {
                tasksData[dateStr].forEach(task => {
                    allTasksList.push({
                        '날짜': dateStr,
                        '할 일': task.text,
                        '시간': task.time || '설정 안 함',
                        '상태': task.completed ? '완료' : '미완료'
                    });
                });
            });

            if (allTasksList.length === 0) {
                alertCustom('내보낼 일정이 없습니다.');
                return;
            }

            allTasksList.sort((a, b) => a.날짜.localeCompare(b.날짜));
            const worksheet = XLSX.utils.json_to_sheet(allTasksList);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "할일목록");
            XLSX.writeFile(workbook, `업무일정_${getTodayString()}.xlsx`);
        }

        function alertCustom(message) {
            const alertBox = document.createElement('div');
            alertBox.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4';
            alertBox.innerHTML = `
                <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl text-center">
                    <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-3 text-lg">
                        <i class="fas fa-info"></i>
                    </div>
                    <p class="text-slate-800 font-medium text-base mb-5">${message}</p>
                    <button id="alert-close-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-xl transition">
                        확인
                    </button>
                </div>
            `;
            document.body.appendChild(alertBox);
            document.getElementById('alert-close-btn').onclick = () => alertBox.remove();
        }

        function toggleTask(id) {
            const tasks = tasksData[currentDate];
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveData();
                render();
            }
        }

        function deleteTask(id) {
            tasksData[currentDate] = tasksData[currentDate].filter(t => t.id !== id);
            if (tasksData[currentDate].length === 0) {
                delete tasksData[currentDate];
            }
            saveData();
            render();
        }

        function render() {
            if(currentDate === getTodayString()) {
                dateDisplayText.textContent = "오늘의 달성률";
            } else {
                dateDisplayText.textContent = "선택한 날의 달성률";
            }

            generateCalendar();
            const tasks = tasksData[currentDate] || [];
            
            if (tasks.length === 0) {
                emptyState.classList.remove('hidden');
                taskList.innerHTML = '';
                updateProgress(0, 0);
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            taskList.innerHTML = '';
            let completedCount = 0;

            const sortedTasks = [...tasks].sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                if (a.time && b.time) return a.time.localeCompare(b.time);
                if (a.time) return 1;
                if (b.time) return -1;
                return 0;
            });

            sortedTasks.forEach(task => {
                if(task.completed) completedCount++;

                const li = document.createElement('li');
                li.className = `task-item bg-white p-3.5 rounded-2xl border flex items-center justify-between gap-3 shadow-sm ${task.completed ? 'border-indigo-100 bg-indigo-50/30' : 'border-slate-200 hover:border-indigo-300'}`;
                
                let timeBadge = '';
                if (task.time) {
                    timeBadge = `<div class="text-xs font-medium mt-1 flex items-center gap-1 ${task.completed ? 'text-slate-400' : 'text-indigo-500'}">
                                    <i class="far fa-clock"></i> ${task.time}
                                 </div>`;
                }

                li.innerHTML = `
                    <label class="flex items-start gap-3 cursor-pointer flex-1 group">
                        <div class="relative flex items-center justify-center mt-0.5">
                            <input type="checkbox" class="custom-checkbox opacity-0 absolute w-full h-full cursor-pointer z-10" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}')">
                            <div class="w-5 h-5 border-2 border-slate-300 rounded-lg flex items-center justify-center transition-colors group-hover:border-indigo-400 shrink-0">
                                <svg class="w-3.5 h-3.5 text-white hidden pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                        </div>
                        <div class="flex flex-col flex-1 overflow-hidden">
                            <span class="text-sm sm:text-[0.95rem] transition-all duration-200 break-all leading-tight mt-0.5 ${task.completed ? 'text-slate-400 line-through' : 'text-slate-700 font-medium'}">${task.text}</span>
                            ${timeBadge}
                        </div>
                    </label>
                    <button onclick="deleteTask('${task.id}')" class="text-slate-300 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors focus:outline-none shrink-0">
                        <i class="fas fa-trash-alt text-sm"></i>
                    </button>
                `;
                taskList.appendChild(li);
            });

            updateProgress(completedCount, tasks.length);
        }

        function updateProgress(completed, total) {
            if (total === 0) {
                progressBar.style.width = '0%';
                progressText.textContent = '0%';
                return;
            }
            const percentage = Math.round((completed / total) * 100);
            progressBar.style.width = `${percentage}%`;
            progressText.textContent = `${percentage}%`;
            
            if(percentage === 100) {
                progressBar.classList.remove('from-blue-300', 'to-white');
                progressBar.classList.add('from-green-400', 'to-emerald-300');
            } else {
                progressBar.classList.remove('from-green-400', 'to-emerald-300');
                progressBar.classList.add('from-blue-300', 'to-white');
            }
        }

        init();
    </script>
</body>
</html>
